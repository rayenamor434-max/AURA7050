<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sciences Physiques — 1ère S</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0f1520;
  --surface2: #141d2e;
  --surface3: #1a2540;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --blue: #3b82f6;
  --blue-glow: rgba(59,130,246,0.2);
  --cyan: #22d3ee;
  --green: #34d399;
  --pink: #f472b6;
  --orange: #fb923c;
  --yellow: #fbbf24;
  --red: #f87171;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --radius: 14px;
  --sidebar: 260px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'Sora',sans-serif;font-size:14px;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 50% at 20% 0%,rgba(59,130,246,0.06) 0%,transparent 70%),
             radial-gradient(ellipse 50% 60% at 80% 100%,rgba(34,211,238,0.04) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
 
/* ===== LOGIN ===== */
#login{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.login-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:24px;padding:3rem;text-align:center;
  max-width:440px;width:90%;
  box-shadow:0 0 80px rgba(59,130,246,0.08);
  animation:slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
.login-logo{font-size:3rem;margin-bottom:0.5rem;}
.login-title{
  font-family:'Sora',sans-serif;font-weight:800;
  font-size:1.8rem;
  background:linear-gradient(135deg,#e2e8f0,#3b82f6,#22d3ee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:0.4rem;
}
.login-sub{color:var(--text2);font-size:0.9rem;margin-bottom:2rem;}
.login-input{
  width:100%;background:var(--surface2);border:1.5px solid var(--border2);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:1rem;
  padding:0.9rem 1.2rem;border-radius:12px;outline:none;text-align:center;
  transition:border-color 0.2s,box-shadow 0.2s;
  margin-bottom:1rem;
}
.login-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow);}
.login-btn{
  width:100%;background:linear-gradient(135deg,#3b82f6,#06b6d4);
  border:none;color:#fff;font-family:'Sora',sans-serif;font-weight:700;
  font-size:1rem;padding:0.9rem;border-radius:12px;cursor:pointer;
  transition:opacity 0.2s,transform 0.2s;letter-spacing:0.03em;
}
.login-btn:hover{opacity:0.9;transform:translateY(-1px);}
 
/* ===== APP LAYOUT ===== */
#app{display:none;height:100vh;flex-direction:column;position:relative;z-index:1;}
.app-header{
  background:rgba(8,12,20,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:1rem;padding:0 1.5rem;
  height:56px;flex-shrink:0;z-index:10;
}
.header-logo{font-weight:800;font-size:1rem;color:var(--blue);}
.header-name{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:999px;padding:0.3rem 1rem;font-size:0.8rem;color:var(--text2);
  font-family:'Cairo',sans-serif;
}
.header-tabs{display:flex;gap:4px;margin-right:auto;margin-left:1rem;}
.tab{
  padding:0.4rem 1.2rem;border-radius:8px;font-weight:600;font-size:0.85rem;
  cursor:pointer;color:var(--text2);border:none;background:transparent;
  transition:all 0.2s;font-family:'Sora',sans-serif;
}
.tab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.tab:hover:not(.active){color:var(--text);background:rgba(255,255,255,0.04);}
 
.app-body{display:flex;flex:1;overflow:hidden;}
 
/* ===== SIDEBAR ===== */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;padding:1rem 0.75rem;
}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-track{background:transparent;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.sidebar-section{
  font-size:0.7rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.1em;
  padding:0 0.5rem;margin:1rem 0 0.5rem;
}
.sidebar-item{
  display:flex;align-items:center;gap:0.7rem;
  padding:0.6rem 0.75rem;border-radius:10px;cursor:pointer;
  color:var(--text2);transition:all 0.15s;font-size:0.85rem;font-weight:500;
  border:1px solid transparent;margin-bottom:2px;
}
.sidebar-item:hover{background:var(--surface2);color:var(--text);}
.sidebar-item.active{
  background:rgba(59,130,246,0.1);color:var(--blue);
  border-color:rgba(59,130,246,0.2);
}
.sidebar-item .icon{font-size:1rem;flex-shrink:0;}
.sidebar-badge{
  margin-left:auto;background:var(--surface3);
  color:var(--text3);font-size:0.7rem;font-weight:700;
  padding:2px 7px;border-radius:999px;
}
.sidebar-badge.pts{background:rgba(34,211,238,0.1);color:var(--cyan);}
 
/* ===== CONTENT ===== */
.content{flex:1;overflow-y:auto;padding:1.5rem;background:var(--bg);}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-track{background:transparent;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
 
/* ===== WELCOME / EMPTY ===== */
.welcome{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;text-align:center;
  animation:fadeUp 0.4s ease;
}
.welcome-emoji{font-size:3rem;margin-bottom:1rem;}
.welcome-title{
  font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:700;
  margin-bottom:0.5rem;
}
.welcome-sub{color:var(--text2);font-size:0.9rem;}
 
/* ===== COURSE VIEW ===== */
.course-header{
  display:flex;align-items:center;gap:1rem;
  margin-bottom:1.5rem;padding-bottom:1rem;
  border-bottom:1px solid var(--border);
}
.course-icon{
  font-size:2rem;width:56px;height:56px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.course-title{font-size:1.4rem;font-weight:800;margin-bottom:0.2rem;}
.course-subtitle-ar{
  font-family:'Cairo',sans-serif;color:var(--text2);font-size:0.95rem;
  direction:rtl;
}
 
.lang-toggle{
  display:flex;gap:4px;margin-bottom:1.5rem;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:4px;width:fit-content;
}
.lang-btn{
  padding:0.35rem 1rem;border-radius:7px;font-size:0.8rem;font-weight:600;
  cursor:pointer;border:none;background:transparent;color:var(--text2);
  transition:all 0.15s;
}
.lang-btn.active{background:var(--surface2);color:var(--text);}
 
.course-section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;
  transition:border-color 0.2s;
}
.course-section:hover{border-color:var(--border2);}
.section-head{
  display:flex;align-items:center;gap:0.7rem;cursor:pointer;
  user-select:none;
}
.section-head .dot{
  width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;
}
.section-title{font-weight:700;font-size:0.95rem;flex:1;}
.section-arrow{color:var(--text3);transition:transform 0.2s;font-size:0.8rem;}
.section-arrow.open{transform:rotate(90deg);}
.section-body{
  margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);
  display:none;
}
.section-body.open{display:block;}
 
.fr-content{line-height:1.8;color:var(--text);}
.ar-content{
  direction:rtl;text-align:right;font-family:'Cairo',sans-serif;
  line-height:2.1;color:var(--text);display:none;
  font-size:0.95rem;
}
.ar-content.show{display:block;}
.fr-content.hide{display:none;}
 
.formula-box{
  background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(34,211,238,0.06));
  border:1px solid rgba(59,130,246,0.2);border-radius:10px;
  padding:1rem 1.25rem;margin:0.75rem 0;
  font-family:'Sora',sans-serif;font-weight:700;
  font-size:1.2rem;color:var(--cyan);text-align:center;
}
.note-box{
  background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.2);
  border-radius:10px;padding:0.8rem 1rem;margin:0.75rem 0;
  font-size:0.88rem;
}
.note-box::before{content:'💡 ';font-size:1rem;}
.table-mini{width:100%;border-collapse:collapse;margin:0.75rem 0;font-size:0.85rem;}
.table-mini th{
  background:rgba(255,255,255,0.05);padding:0.5rem 0.75rem;
  text-align:left;font-weight:700;color:var(--cyan);
  border-bottom:1px solid var(--border2);
}
.table-mini td{
  padding:0.45rem 0.75rem;border-bottom:1px solid var(--border);
  color:var(--text);
}
.table-mini tr:last-child td{border-bottom:none;}
strong.hl{color:var(--green);}
strong.hlb{color:var(--blue);}
strong.hlp{color:var(--pink);}
 
/* ===== DEVOIR VIEW ===== */
.devoir-header{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius);padding:1.25rem;margin-bottom:1.5rem;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;
}
.devoir-meta h2{font-size:1.1rem;font-weight:800;margin-bottom:0.3rem;}
.devoir-meta p{color:var(--text2);font-size:0.85rem;}
.devoir-total{
  background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.25);
  border-radius:12px;padding:0.75rem 1.25rem;text-align:center;
}
.devoir-total .pts{font-size:1.5rem;font-weight:800;color:var(--cyan);}
.devoir-total .lbl{font-size:0.75rem;color:var(--text2);}
 
.exercise-block{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;
}
.ex-title-bar{
  display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;
  padding-bottom:0.75rem;border-bottom:1px solid var(--border);
}
.ex-subject{
  font-size:0.7rem;font-weight:800;letter-spacing:0.08em;
  text-transform:uppercase;padding:3px 10px;border-radius:6px;
}
.ex-subject.chimie{background:rgba(52,211,153,0.12);color:var(--green);}
.ex-subject.physique{background:rgba(59,130,246,0.12);color:var(--blue);}
.ex-title{font-weight:700;font-size:0.95rem;flex:1;}
.ex-pts{
  background:var(--surface3);color:var(--text2);
  font-size:0.8rem;font-weight:700;padding:3px 10px;
  border-radius:999px;white-space:nowrap;
}
.context-box{
  background:var(--surface2);border-left:3px solid var(--blue);
  border-radius:0 8px 8px 0;padding:0.75rem 1rem;
  margin-bottom:1rem;font-size:0.88rem;line-height:1.7;color:var(--text2);
}
.question-block{margin-bottom:0.9rem;}
.q-label{
  font-weight:600;font-size:0.88rem;color:var(--text);
  margin-bottom:0.4rem;line-height:1.6;display:flex;gap:0.5rem;
}
.q-pts{
  background:rgba(251,191,36,0.1);color:var(--yellow);
  font-size:0.72rem;padding:1px 7px;border-radius:5px;
  font-weight:700;flex-shrink:0;margin-top:2px;height:fit-content;
}
.answer-input{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:0.9rem;
  padding:0.65rem 0.9rem;border-radius:9px;outline:none;
  transition:border-color 0.2s;resize:vertical;min-height:60px;
  line-height:1.6;
}
.answer-input:focus{border-color:var(--blue);}
.answer-input::placeholder{color:var(--text3);}
 
.correction-bar{
  display:flex;align-items:center;gap:1rem;
  margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);
  flex-wrap:wrap;
}
.btn-correct{
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  border:none;color:#fff;font-family:'Sora',sans-serif;font-weight:700;
  font-size:0.9rem;padding:0.7rem 1.5rem;border-radius:10px;
  cursor:pointer;transition:opacity 0.2s,transform 0.2s;
}
.btn-correct:hover{opacity:0.9;transform:translateY(-1px);}
.btn-correct:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.grade-badge{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;padding:0.5rem 1rem;font-weight:700;
  display:none;
}
.grade-badge.show{display:flex;align-items:center;gap:0.5rem;}
.grade-num{font-size:1.2rem;}
.grade-num.good{color:var(--green);}
.grade-num.mid{color:var(--yellow);}
.grade-num.low{color:var(--red);}
 
.correction-panel{
  margin-top:1rem;border-radius:var(--radius);overflow:hidden;display:none;
}
.correction-panel.show{display:block;}
.correction-header{
  background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(34,211,238,0.08));
  border:1px solid rgba(59,130,246,0.2);border-bottom:none;
  padding:0.75rem 1.25rem;display:flex;align-items:center;gap:0.6rem;
  border-radius:var(--radius) var(--radius) 0 0;
}
.correction-header span{font-weight:700;color:var(--cyan);}
.correction-body{
  background:var(--surface);border:1px solid rgba(59,130,246,0.15);
  border-radius:0 0 var(--radius) var(--radius);padding:1.25rem;
}
.q-correction{
  margin-bottom:0.9rem;padding:0.9rem;border-radius:9px;
  border:1px solid var(--border);
}
.q-correction.correct{border-color:rgba(52,211,153,0.25);background:rgba(52,211,153,0.04);}
.q-correction.wrong{border-color:rgba(248,113,113,0.25);background:rgba(248,113,113,0.04);}
.q-correction.partial{border-color:rgba(251,191,36,0.25);background:rgba(251,191,36,0.04);}
.q-corr-title{
  font-weight:700;font-size:0.85rem;display:flex;align-items:center;
  gap:0.5rem;margin-bottom:0.5rem;
}
.q-corr-fr{font-size:0.85rem;line-height:1.6;margin-bottom:0.3rem;color:var(--text);}
.q-corr-ar{
  font-family:'Cairo',sans-serif;font-size:0.88rem;direction:rtl;
  text-align:right;line-height:1.9;color:var(--text2);
  border-top:1px solid var(--border);margin-top:0.4rem;padding-top:0.4rem;
}
.loading-dots{display:inline-flex;gap:4px;align-items:center;}
.loading-dots span{
  width:6px;height:6px;border-radius:50%;background:var(--cyan);
  animation:bounce 1.2s infinite;
}
.loading-dots span:nth-child(2){animation-delay:0.2s;}
.loading-dots span:nth-child(3){animation-delay:0.4s;}
 
/* ===== WATERMARK ===== */
.watermark{
  position:fixed;bottom:12px;right:16px;z-index:5;
  font-size:0.7rem;color:rgba(255,255,255,0.07);
  font-family:'Sora',sans-serif;letter-spacing:0.1em;
  pointer-events:none;user-select:none;
}
 
/* ===== ANIMATIONS ===== */
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes bounce{0%,80%,100%{transform:scale(0.8);}40%{transform:scale(1.2);}}
 
/* Scrollbar global */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
</style>
</head>
<body>
 
<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">🧪</div>
    <div class="login-title">Sciences Physiques</div>
    <div class="login-sub" style="font-family:'Cairo',sans-serif;">1ère S — المرحلة الأولى ثانوي</div>
    <input class="login-input" id="name-input" type="text" placeholder="أدخل اسمك / Entrez votre prénom" autocomplete="off" />
    <button class="login-btn" onclick="startApp()">ابدأ الدراسة — Commencer ▶</button>
  </div>
</div>
 
<!-- APP -->
<div id="app">
  <div class="app-header">
    <div class="header-logo">⚗️ PhySci 1S</div>
    <div class="header-tabs">
      <button class="tab active" id="tab-cours" onclick="switchSection('cours')">📚 Cours</button>
      <button class="tab" id="tab-devoirs" onclick="switchSection('devoirs')">📝 Devoirs</button>
    </div>
    <div class="header-name" id="header-name"></div>
  </div>
  <div class="app-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content">
      <div class="welcome">
        <div class="welcome-emoji">👋</div>
        <div class="welcome-title">Sélectionne un chapitre</div>
        <div class="welcome-sub" style="font-family:'Cairo',sans-serif;">اختر فصلاً من القائمة الجانبية</div>
      </div>
    </div>
  </div>
</div>
 
<div class="watermark">Rayen ✦</div>
 
<script>
// ─────────────────────────────────────────
//  DATA: COURSES
// ─────────────────────────────────────────
const COURSES = [
  {
    id:'circuit', icon:'⚡', title:'Circuit Électrique', titleAr:'الدائرة الكهربائية',
    sections:[
      {
        title:'Les conducteurs et les isolants',titleAr:'الموصلات والعوازل الكهربائية',
        fr:`Un <strong class="hl">conducteur électrique</strong> est toute matière qui laisse passer le courant électrique.<br>
<strong>Exemples :</strong> le cuivre (Cu), le fer (Fe), le graphite, l'aluminium.<br><br>
Un <strong class="hlp">isolant électrique</strong> est toute matière qui ne laisse <em>pas</em> passer le courant électrique.<br>
<strong>Exemples :</strong> le verre, le bois, le plastique, l'air, la porcelaine.`,
        ar:`<strong>الموصل الكهربائي</strong> هو كل مادة تسمح بمرور التيار الكهربائي.<br>
<strong>أمثلة:</strong> النحاس، الحديد، الغرافيت، الألومنيوم.<br><br>
<strong>العازل الكهربائي</strong> هو كل مادة لا تسمح بمرور التيار الكهربائي.<br>
<strong>أمثلة:</strong> الزجاج، الخشب، البلاستيك، الهواء، الخزف.`
      },
      {
        title:'Les effets du courant électrique',titleAr:'تأثيرات التيار الكهربائي',
        fr:`<table class="table-mini"><thead><tr><th>Effet</th><th>Dispositif</th><th>Description</th></tr></thead>
<tbody>
<tr><td>🔥 <strong>Thermique</strong></td><td>Lampe, radiateur</td><td>Le courant chauffe le filament qui émet de la lumière</td></tr>
<tr><td>⚗️ <strong>Chimique</strong></td><td>Électrolyseur</td><td>Le courant transforme l'eau salée en eau de javel</td></tr>
<tr><td>🧲 <strong>Magnétique</strong></td><td>Aiguille aimantée</td><td>Le courant crée un champ magnétique qui dévie l'aiguille</td></tr>
<tr><td>💡 <strong>Lumineux</strong></td><td>DEL (LED)</td><td>La diode émet de la lumière sans chauffer</td></tr>
</tbody></table>`,
        ar:`<table class="table-mini"><thead><tr><th>التأثير</th><th>الجهاز</th><th>الوصف</th></tr></thead>
<tbody>
<tr><td>🔥 <strong>الحراري</strong></td><td>المصباح، المدفأة</td><td>يُسخّن التيار خيط المصباح فيُصدر ضوءاً</td></tr>
<tr><td>⚗️ <strong>الكيميائي</strong></td><td>المحلّل الكهربائي</td><td>يُحوّل التيار الماء المالح إلى ماء جافيل</td></tr>
<tr><td>🧲 <strong>المغناطيسي</strong></td><td>الإبرة المغناطيسية</td><td>يُنشئ التيار مجالاً مغناطيسياً يُنحرف به الإبرة</td></tr>
<tr><td>💡 <strong>الضوئي</strong></td><td>الصمام LED</td><td>الصمام يُصدر ضوءاً دون توليد حرارة</td></tr>
</tbody></table>`
      },
      {
        title:'Court-circuit',titleAr:'الدارة القصيرة',
        fr:`Un <strong class="hlp">court-circuit</strong> se produit lorsqu'on relie les deux bornes d'un dipôle par un fil conducteur.<br><br>

        ar:`تحدث <strong>الدارة القصيرة</strong> عندما يُوصَل طرفا ثنائي القطب بسلك موصل مباشرةً.<br><br>

<div class="note-box" style="text-align:right">التيار يختار دائماً المسار الأقل مقاومةً (السلك الموصل).</div>`

        ar:`الفعل الميكانيكي هو فعل يمارسه جسم A على جسم B. يتجلى في نوعين من التأثيرات:<br><br>

<li><strong>T</strong> : tension du ressort (N)</li>
<li><strong>k</strong> : constante de raideur (N·m⁻¹)</li>
<li><strong>x = ℓ − ℓ₀</strong> : allongement (m)</li>

</ul>`,

<li><strong>T</strong>: توتر النابض (N)</li>
<li><strong>k</strong>: ثابت المرونة (N·m⁻¹)</li>
<li><strong>x = ℓ − ℓ₀</strong>: الإطالة (m)</li>
<li><strong>ℓ₀</strong>: الطول الطبيعي (m)، <strong>ℓ</strong>: الطول تحت الحمل (m)</li>
</ul>`

<tr><td>✅ Sens opposés</td><td>L'une va vers le haut, l'autre vers le bas</td></tr>
</tbody></table>`,
        ar:`الجسم الخاضع لـ<strong>قوتين</strong> يكون في حالة توازن إذا وفقط إذا كانت القوتان:<br><br>

<table class="table-mini"><thead><tr><th>الشرط</th><th>التفسير</th></tr></thead>

<tr><td>✅ نفس القيمة</td><td>‖F⃗₁‖ = ‖F⃗₂‖</td></tr>

document.getElementById('name-input').addEventListener('keydown', e=>{
  if(e.key==='Enter') startApp();
});
 
function startApp(){
  const n = document.getElementById('name-input').value.trim();
  if(!n){
    document.getElementById('name-input').style.borderColor='var(--red)';
    setTimeout(()=>document.getElementById('name-input').style.borderColor='',1000);
    return;
  }
  state.name = n;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('header-name').textContent = '👤 ' + n;
  switchSection('cours');
}
 
// ─────────────────────────────────────────
//  SECTION SWITCH
// ─────────────────────────────────────────
function switchSection(sec){
  state.section=sec; state.currentId=null;
  document.getElementById('tab-cours').className='tab'+(sec==='cours'?' active':'');
  document.getElementById('tab-devoirs').className='tab'+(sec==='devoirs'?' active':'');
  renderSidebar();
  document.getElementById('content').innerHTML = `
    <div class="welcome">
      <div class="welcome-emoji">${sec==='cours'?'📚':'📝'}</div>
      <div class="welcome-title">${sec==='cours'?'Sélectionne un chapitre':'Choisis un devoir'}</div>
      <div class="welcome-sub" style="font-family:'Cairo',sans-serif">${sec==='cours'?'اختر فصلاً من القائمة':'اختر فرضاً من القائمة'}</div>
    </div>`;
}

function renderSidebar(){
  const sb = document.getElementById('sidebar');
  if(state.section==='cours'){
    sb.innerHTML = `<div class="sidebar-section">📚 Chapitres</div>` +
      COURSES.map(c=>`<div class="sidebar-item${state.currentId===c.id?' active':''}" onclick="loadCourse('${c.id}')">
        <span class="icon">${c.icon}</span>
        <span>${c.title}</span>
      </div>`).join('');
  } else {
    sb.innerHTML = `<div class="sidebar-section">📝 Devoirs</div>` +
      DEVOIRS.map(d=>`<div class="sidebar-item${state.currentId===d.id?' active':''}" onclick="loadDevoir('${d.id}')">
        <span class="icon">📋</span>
        <div style="flex:1;overflow:hidden">
          <div style="font-size:0.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.year}</div>
          <div style="font-size:0.72rem;color:var(--text3)">${d.prof.replace('Prof. ','').replace('Prof: ','')}</div>
        </div>
        ${state.grades[d.id]!==undefined?`<span class="sidebar-badge pts">${state.grades[d.id]}/20</span>`:''}
      </div>`).join('');
  }
}
 
// ─────────────────────────────────────────
//  LOAD COURSE
// ─────────────────────────────────────────
function loadCourse(id){
  state.currentId = id;
  renderSidebar();
  const c = COURSES.find(x=>x.id===id);
  if(!c) return;
  const langBtns = `<div class="lang-toggle">
    <button class="lang-btn${state.lang==='fr'?' active':''}" onclick="setLang('fr')">🇫🇷 Français</button>
    <button class="lang-btn${state.lang==='ar'?' active':''}" onclick="setLang('ar')">🇹🇳 عربي</button>
  </div>`;
  const sections = c.sections.map((s,i)=>`
    <div class="course-section">
      <div class="section-head" onclick="toggleSection(this)">
        <div class="dot"></div>
        <div class="section-title">${s.title} <span style="color:var(--text3);font-size:0.8rem;font-family:'Cairo',sans-serif">&nbsp;${s.titleAr}</span></div>
        <div class="section-arrow">▶</div>
      </div>
      <div class="section-body${i===0?' open':''}">
        <div class="fr-content${state.lang==='ar'?' hide':''}">${s.fr}</div>
        <div class="ar-content${state.lang==='ar'?' show':''}">${s.ar}</div>
      </div>
    </div>`).join('');
 
  document.getElementById('content').innerHTML = `
    <div style="animation:fadeUp 0.3s ease">
      <div class="course-header">
        <div class="course-icon">${c.icon}</div>
        <div>
          <div class="course-title">${c.title}</div>
          <div class="course-subtitle-ar">${c.titleAr}</div>
        </div>
      </div>
      ${langBtns}
      ${sections}
    </div>`;
}
 
function setLang(l){
  state.lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(l==='fr'?'Fr':'عر')||b.textContent.includes(l==='fr'?'ança':'رب')));
  // Update visibility
  document.querySelectorAll('.fr-content').forEach(el=>el.classList.toggle('hide',l==='ar'));
  document.querySelectorAll('.ar-content').forEach(el=>el.classList.toggle('show',l==='ar'));
  // Refresh lang buttons
  document.querySelectorAll('.lang-btn').forEach(b=>{
    const isFr = b.textContent.includes('Fran') || b.textContent.includes('fr');
    b.classList.toggle('active',(l==='fr'&&isFr)||(l==='ar'&&!isFr));
  });
}
 
function toggleSection(head){
  const body = head.nextElementSibling;
  const arrow = head.querySelector('.section-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}
 
// ─────────────────────────────────────────
//  LOAD DEVOIR
// ─────────────────────────────────────────
function loadDevoir(id){
  state.currentId = id;
  renderSidebar();
  const d = DEVOIRS.find(x=>x.id===id);
  if(!d) return;
  // Init answers
  d.exercises.forEach(ex=>ex.questions.forEach(q=>{
    if(!state.answers[id]) state.answers[id]={};
    if(state.answers[id][q.id]===undefined) state.answers[id][q.id]='';
  }));
 
  const grade = state.grades[id];
  const gradeHtml = grade!==undefined ?
    `<div class="grade-badge show"><span>Note :</span><span class="grade-num ${grade>=14?'good':grade>=10?'mid':'low'}">${grade}/20</span></div>` : '';
 
  const exHtml = d.exercises.map(ex=>renderExercise(d,ex)).join('');
  const corrPanel = state.corrections[id] ? renderCorrectionPanel(id) : '';
 
  document.getElementById('content').innerHTML = `
    <div style="animation:fadeUp 0.3s ease">
      <div class="devoir-header">
        <div class="devoir-meta">
          <h2>${d.title} — ${d.year}</h2>
          <p>${d.lycee} &nbsp;·&nbsp; ${d.prof}</p>
        </div>
        <div class="devoir-total">
          <div class="pts">${d.total}</div>
          <div class="lbl">points</div>
        </div>
      </div>
      ${exHtml}
      <div class="correction-bar">
        <button class="btn-correct" id="btn-corr-${id}" onclick="gradeDevoir('${id}')">
          🔍 Corriger et noter
        </button>
        ${gradeHtml}
      </div>
      <div id="corr-panel-${id}">${corrPanel}</div>
    </div>`;
}
 
function renderExercise(d, ex){
  const subCls = ex.subject==='chimie'?'chimie':'physique';
  const subLabel = ex.subject==='chimie'?'CHIMIE':'PHYSIQUE';
  const qHtml = ex.questions.map(q=>{
    const val = (state.answers[d.id]||{})[q.id]||'';
    return `<div class="question-block">
      <div class="q-label">
        <span>${q.text}</span>
        <span class="q-pts">${q.points} pt${q.points>1?'s':''}</span>
      </div>
      <textarea class="answer-input" placeholder="Votre réponse ici... / أجبكَ هنا..." rows="2"
        oninput="saveAnswer('${d.id}','${q.id}',this.value)">${escHtml(val)}</textarea>
    </div>`;
  }).join('');
  return `<div class="exercise-block">
    <div class="ex-title-bar">
      <span class="ex-subject ${subCls}">${subLabel}</span>
      <span class="ex-title">${ex.title}</span>
      <span class="ex-pts">${ex.points} pts</span>
    </div>
    ${ex.context?`<div class="context-box">${ex.context}</div>`:''}
    ${qHtml}
  </div>`;
}
 
function saveAnswer(dId, qId, val){
  if(!state.answers[dId]) state.answers[dId]={};
  state.answers[dId][qId] = val;
}
 
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─────────────────────────────────────────
//  GRADE DEVOIR (LOCAL — no fetch needed)
// ─────────────────────────────────────────
function gradeDevoir(dId){
  const d = DEVOIRS.find(x=>x.id===dId);
  if(!d) return;
  const btn = document.getElementById('btn-corr-'+dId);
  btn.disabled = true;
  btn.innerHTML = `<span class="loading-dots"><span></span><span></span><span></span></span> Correction en cours...`;

  // Small delay for UX feedback
  setTimeout(()=>{
    try {
      const answers = state.answers[dId] || {};
      const dAnswers = CORRECT_ANSWERS[dId] || {};
      const allQ = [];
      d.exercises.forEach(ex=>ex.questions.forEach(q=>allQ.push(q)));

      let totalEarned = 0;
      let totalMax = 0;
      const questionResults = [];

      allQ.forEach(q=>{
        const userRaw = (answers[q.id]||'').toLowerCase().trim();
        const ref = dAnswers[q.id];
        const maxPts = q.points;
        totalMax += maxPts;

        if(!ref){
          // No answer key for this question — award partial credit if student wrote something
          const earned = userRaw.length > 5 ? maxPts * 0.5 : 0;
          totalEarned += earned;
          questionResults.push({
            id: q.id, earned: Math.round(earned*100)/100, max: maxPts,
            status: earned >= maxPts ? 'correct' : earned > 0 ? 'partial' : 'wrong',
            correction_fr: `Réponse attendue non disponible pour cette question.`,
            correction_ar: `الإجابة المرجعية غير متوفرة لهذا السؤال.`
          });
          return;
        }

        const keywords = ref.keywords_fr || [];
        if(!userRaw || userRaw.length < 2){
          questionResults.push({
            id: q.id, earned: 0, max: maxPts, status: 'wrong',
            correction_fr: `Aucune réponse. Réponse correcte : ${ref.answer_fr}`,
            correction_ar: `لا توجد إجابة. الإجابة الصحيحة: ${ref.answer_ar}`
          });
          return;
        }

        // Count keyword matches (normalise spaces, symbols)
        const clean = userRaw.replace(/[×·\*]/g,'').replace(/\s+/g,' ');
        let matched = 0;
        keywords.forEach(kw=>{
          if(clean.includes(kw.toLowerCase())) matched++;
        });

        const ratio = keywords.length > 0 ? matched / keywords.length : 0;
        let earned, status;
        if(ratio >= 0.55){
          earned = maxPts; status = 'correct';
        } else if(ratio >= 0.2){
          earned = Math.round(maxPts * 0.5 * 100) / 100; status = 'partial';
        } else {
          earned = 0; status = 'wrong';
        }
        totalEarned += earned;

        const fb_fr = status==='correct'
          ? `✅ Bonne réponse ! ${ref.answer_fr}`
          : status==='partial'
          ? `🔶 Réponse incomplète. Réponse complète : ${ref.answer_fr}`
          : `❌ Réponse incorrecte. Réponse correcte : ${ref.answer_fr}`;

        const fb_ar = status==='correct'
          ? `✅ إجابة صحيحة! ${ref.answer_ar}`
          : status==='partial'
          ? `🔶 إجابة ناقصة. الإجابة الكاملة: ${ref.answer_ar}`
          : `❌ إجابة خاطئة. الإجابة الصحيحة: ${ref.answer_ar}`;

        questionResults.push({ id:q.id, earned, max:maxPts, status, correction_fr:fb_fr, correction_ar:fb_ar });
      });

      // Scale to 20
      const note = totalMax > 0 ? Math.round((totalEarned / totalMax) * 20 * 100) / 100 : 0;

      // General comment
      let comment_fr, comment_ar;
      if(note >= 16){
        comment_fr = "Excellent travail ! Tu maîtrises très bien les notions abordées dans ce devoir. Continue ainsi !";
        comment_ar = "عمل ممتاز! أنت تتقن المفاهيم المطروحة في هذا الفرض. استمر هكذا!";
      } else if(note >= 14){
        comment_fr = "Très bon résultat ! Quelques points à revoir mais l'ensemble est bien compris. Bravo !";
        comment_ar = "نتيجة جيدة جداً! بعض النقاط تحتاج مراجعة لكن المحتوى مفهوم بشكل جيد. أحسنت!";
      } else if(note >= 10){
        comment_fr = "Résultat passable. Tu as compris les bases mais certaines notions nécessitent plus de travail. Révise les cours et réessaie !";
        comment_ar = "نتيجة مقبولة. فهمت الأساسيات لكن بعض المفاهيم تحتاج مزيداً من العمل. راجع الدروس وأعد المحاولة!";
      } else {
        comment_fr = "Des difficultés importantes. Il faut retravailler le cours en profondeur et faire plus d'exercices. N'abandonne pas !";
        comment_ar = "صعوبات كبيرة. يجب إعادة دراسة الدرس بعمق وحل المزيد من التمارين. لا تستسلم!";
      }

      const result = { total: note, questions: questionResults, comment_fr, comment_ar };
      state.corrections[dId] = result;
      state.grades[dId] = result.total;
      renderSidebar();
      loadDevoir(dId);

    } catch(e){
      btn.disabled = false;
      btn.innerHTML = '🔍 Corriger et noter';
      console.error(e);
    }
  }, 800);
}
 
function renderCorrectionPanel(dId){
  const corr = state.corrections[dId];
  if(!corr) return '';
  const d = DEVOIRS.find(x=>x.id===dId);
  // Build a map of all questions
  const allQ = [];
  d.exercises.forEach(ex=>ex.questions.forEach(q=>allQ.push(q)));
 
  const qHtml = (corr.questions||[]).map(cq=>{
    const q = allQ.find(x=>x.id===cq.id);
    const icon = cq.status==='correct'?'✅':cq.status==='partial'?'🔶':'❌';
    return `<div class="q-correction ${cq.status}">
      <div class="q-corr-title">
        ${icon} <span style="color:var(--text2);font-size:0.8rem">${q?q.text.substring(0,60)+'...':cq.id}</span>
        <span style="margin-left:auto;font-weight:800;color:${cq.status==='correct'?'var(--green)':cq.status==='partial'?'var(--yellow)':'var(--red)'}">${cq.earned}/${cq.max}</span>
      </div>
      <div class="q-corr-fr">🇫🇷 ${cq.correction_fr}</div>
      <div class="q-corr-ar">🇹🇳 ${cq.correction_ar}</div>
    </div>`;
  }).join('');
 
  const tot = corr.total;
  const col = tot>=14?'var(--green)':tot>=10?'var(--yellow)':'var(--red)';
 
  return `<div class="correction-panel show">
    <div class="correction-header">
      <span>📊 Correction — </span>
      <span style="font-size:1.3rem;color:${col}">${tot}/20</span>
      <span style="margin-left:0.5rem;color:var(--text2);font-size:0.85rem">${state.name}</span>
    </div>
    <div class="correction-body">
      ${qHtml}
      <div style="margin-top:1rem;padding:1rem;background:var(--surface2);border-radius:10px;">
        <div style="font-weight:700;margin-bottom:0.5rem;color:var(--cyan)">💬 Commentaire général</div>
        <div style="font-size:0.88rem;line-height:1.7;margin-bottom:0.5rem">${corr.comment_fr}</div>
        <div style="font-family:'Cairo',sans-serif;direction:rtl;text-align:right;font-size:0.9rem;line-height:1.9;color:var(--text2)">${corr.comment_ar}</div>
      </div>
    </div>
  </div>`;
}
